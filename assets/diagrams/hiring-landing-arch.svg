<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1280 640' role='img' aria-labelledby='t d'>
  <title id='t'>Hiring Landing Architecture</title>
  <desc id='d'>Content blocks - CTA flow - performance budget</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#113a54'/>
      <stop offset='100%' stop-color='#1f9a8a'/>
    </linearGradient>
  </defs>
  <rect width='1280' height='640' fill='url(#bg)'/>
  <rect x='60' y='80' width='1160' height='500' rx='28' fill='#0b1622' fill-opacity='0.72' stroke='#86b8c8' stroke-opacity='0.26'/>

  <rect x='120' y='160' width='270' height='130' rx='16' fill='#143049' stroke='#89b4c7' stroke-opacity='0.35'/>
  <text x='150' y='208' fill='#e9f5fb' font-size='28' font-family='Sora, Segoe UI, sans-serif' font-weight='700'>UI Layer</text>
  <text x='150' y='244' fill='#b7d2de' font-size='18' font-family='IBM Plex Sans, Segoe UI, sans-serif'>Views / Components / States</text>

  <rect x='500' y='160' width='280' height='130' rx='16' fill='#143049' stroke='#89b4c7' stroke-opacity='0.35'/>
  <text x='532' y='208' fill='#e9f5fb' font-size='28' font-family='Sora, Segoe UI, sans-serif' font-weight='700'>Domain Layer</text>
  <text x='532' y='244' fill='#b7d2de' font-size='18' font-family='IBM Plex Sans, Segoe UI, sans-serif'>Business rules / schema</text>

  <rect x='900' y='160' width='250' height='130' rx='16' fill='#143049' stroke='#89b4c7' stroke-opacity='0.35'/>
  <text x='930' y='208' fill='#e9f5fb' font-size='28' font-family='Sora, Segoe UI, sans-serif' font-weight='700'>Data Layer</text>
  <text x='930' y='244' fill='#b7d2de' font-size='18' font-family='IBM Plex Sans, Segoe UI, sans-serif'>API / cache / events</text>

  <rect x='120' y='370' width='1030' height='130' rx='16' fill='#112a3f' stroke='#86b8c8' stroke-opacity='0.3'/>
  <text x='154' y='418' fill='#e8f5fb' font-size='28' font-family='Sora, Segoe UI, sans-serif' font-weight='700'>Release Flow</text>
  <text x='154' y='454' fill='#b7d2de' font-size='18' font-family='IBM Plex Sans, Segoe UI, sans-serif'>QA checklist -> performance checks -> rollout -> feedback loop</text>

  <path d='M390 225 H500' stroke='#b7d2de' stroke-width='3' marker-end='url(#arrow)'/>
  <path d='M780 225 H900' stroke='#b7d2de' stroke-width='3' marker-end='url(#arrow)'/>
  <defs>
    <marker id='arrow' markerWidth='8' markerHeight='8' refX='7' refY='4' orient='auto'>
      <path d='M0,0 L8,4 L0,8 z' fill='#b7d2de'/>
    </marker>
  </defs>

  <text x='120' y='122' fill='#e8f5fb' font-size='34' font-family='Sora, Segoe UI, sans-serif' font-weight='800'>Hiring Landing Architecture</text>
  <text x='120' y='562' fill='#a6c7d5' font-size='19' font-family='IBM Plex Sans, Segoe UI, sans-serif'>Content blocks - CTA flow - performance budget</text>
</svg>
